<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Derpy 8EyeTieDye Spider Mascot -->

  <!-- Web strand the spider hangs from -->
  <line x1="100" y1="0" x2="100" y2="45" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Legs - wonky, uneven, noodly -->
  <!-- Left legs -->
  <path d="M 72 105 Q 40 85 18 65" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 68 115 Q 30 110 8 95" stroke="#ec4899" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 68 125 Q 25 135 5 125" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 72 135 Q 45 160 22 170" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Right legs -->
  <path d="M 128 105 Q 155 80 185 72" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 132 115 Q 170 105 192 100" stroke="#f97316" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 132 125 Q 175 130 195 120" stroke="#ec4899" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 128 135 Q 160 165 180 175" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Leg tips - little feet -->
  <circle cx="18" cy="65" r="3" fill="#7c3aed"/>
  <circle cx="8" cy="95" r="3" fill="#ec4899"/>
  <circle cx="5" cy="125" r="3" fill="#f97316"/>
  <circle cx="22" cy="170" r="3" fill="#22c55e"/>
  <circle cx="185" cy="72" r="3" fill="#22c55e"/>
  <circle cx="192" cy="100" r="3" fill="#f97316"/>
  <circle cx="195" cy="120" r="3" fill="#ec4899"/>
  <circle cx="180" cy="175" r="3" fill="#7c3aed"/>

  <!-- Body (abdomen) - big round butt -->
  <ellipse cx="100" cy="140" rx="32" ry="28" fill="#1a1a24" stroke="#7c3aed" stroke-width="2"/>
  <!-- Tie-dye swirl on butt -->
  <path d="M 100 118 Q 120 130 108 148 Q 95 160 85 145 Q 78 130 100 118" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <path d="M 100 122 Q 115 132 106 144 Q 98 152 90 142 Q 84 132 100 122" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>

  <!-- Head - round, chubby -->
  <circle cx="100" cy="95" r="38" fill="#1a1a24" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- 8 Eyes - all different sizes, looking in random directions = maximum derp -->
  <!-- Top row (2 tiny eyes) -->
  <circle cx="88" cy="74" r="4" fill="white"/>
  <circle cx="89" cy="75" r="2" fill="#111"/>
  <circle cx="112" cy="74" r="4" fill="white"/>
  <circle cx="114" cy="73" r="2" fill="#111"/>

  <!-- Middle row (4 big goofy eyes - the main ones) -->
  <!-- Far left eye - looking down -->
  <ellipse cx="74" cy="90" rx="8" ry="9" fill="white"/>
  <circle cx="74" cy="93" r="4.5" fill="#7c3aed"/>
  <circle cx="73" cy="94" r="2" fill="#111"/>

  <!-- Inner left eye - looking right (cross-eyed) -->
  <ellipse cx="91" cy="88" rx="10" ry="11" fill="white"/>
  <circle cx="96" cy="89" r="5" fill="#ec4899"/>
  <circle cx="97" cy="90" r="2.5" fill="#111"/>

  <!-- Inner right eye - looking left (cross-eyed) -->
  <ellipse cx="109" cy="88" rx="10" ry="11" fill="white"/>
  <circle cx="104" cy="89" r="5" fill="#ec4899"/>
  <circle cx="103" cy="90" r="2.5" fill="#111"/>

  <!-- Far right eye - looking up -->
  <ellipse cx="126" cy="90" rx="8" ry="9" fill="white"/>
  <circle cx="127" cy="86" r="4.5" fill="#7c3aed"/>
  <circle cx="128" cy="85" r="2" fill="#111"/>

  <!-- Bottom row (2 small eyes) -->
  <circle cx="92" cy="105" r="5" fill="white"/>
  <circle cx="90" cy="106" r="2.5" fill="#22c55e"/>
  <circle cx="89" cy="107" r="1.2" fill="#111"/>
  <circle cx="108" cy="105" r="5" fill="white"/>
  <circle cx="110" cy="104" r="2.5" fill="#22c55e"/>
  <circle cx="111" cy="103" r="1.2" fill="#111"/>

  <!-- Dumb smile - big goofy grin -->
  <path d="M 82 108 Q 100 125 118 108" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Two little fangs/buck teeth -->
  <rect x="95" y="112" width="4" height="6" rx="1.5" fill="white"/>
  <rect x="101" y="112" width="4" height="7" rx="1.5" fill="white" transform="rotate(3 103 115)"/>

  <!-- Blush spots -->
  <circle cx="73" cy="103" r="6" fill="#ec4899" opacity="0.2"/>
  <circle cx="127" cy="103" r="6" fill="#ec4899" opacity="0.2"/>

  <!-- Little hat - tiny tie-dye beanie sitting crooked -->
  <ellipse cx="100" cy="62" rx="22" ry="6" fill="#7c3aed" transform="rotate(-8 100 62)"/>
  <path d="M 80 62 Q 82 42 100 38 Q 118 42 120 62" fill="#7c3aed" transform="rotate(-8 100 62)"/>
  <path d="M 85 58 Q 90 44 100 41 Q 110 44 115 58" fill="#ec4899" opacity="0.5" transform="rotate(-8 100 62)"/>
  <circle cx="100" cy="36" r="4" fill="#f97316" transform="rotate(-8 100 62)"/>
</svg>
