name: CI/CD

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Pipeline 1: develop push → check → auto-merge to staging ──────────────
  check:
    name: Check
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAACtWcxyuvvP_rV0I

      - name: Audit
        run: pnpm audit --prod
        continue-on-error: true

  promote-to-staging:
    name: Promote to Staging
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Merge develop into staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout staging
          git merge origin/develop --ff-only
          git push origin staging

  # ── Pipeline 2: staging push → deploy to staging environment ──────────────
  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAACtWcxyuvvP_rV0I

      - name: Generate staging config
        run: |
          python3 -c "
          import json
          with open('dist/server/wrangler.json') as f:
              config = json.load(f)
          config['name'] = '8eyetiedye-staging'
          config['vars']['ENVIRONMENT'] = 'staging'
          config['d1_databases'] = [{'binding': 'DB', 'database_name': '8eyetiedye-db-staging', 'database_id': 'aab22788-9e9e-404c-b43b-50ed25ddb0b4'}]
          config['kv_namespaces'] = [ns for ns in config['kv_namespaces'] if ns['binding'] != 'SESSIONS'] + [{'binding': 'SESSIONS', 'id': '5bcb074a9f694c4d9244f9ef7aaa9c50'}]
          with open('dist/server/wrangler.staging.json', 'w') as f:
              json.dump(config, f)
          "

      - name: Deploy Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.staging.json

      - name: Smoke test staging
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://staging.8eyetiedye.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! Health endpoint returned $STATUS"
            exit 1
          fi
          echo "Staging smoke test passed"

  # ── Pipeline 3: PR merge to main → check + deploy production ─────────────
  check-production:
    name: Check (Production)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAACtWcxyuvvP_rV0I

      - name: Audit
        run: pnpm audit --prod
        continue-on-error: true

  deploy-production:
    name: Deploy Production
    needs: [check-production]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAACtWcxyuvvP_rV0I

      - name: Deploy Production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke test production
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://8eyetiedye.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed! Health endpoint returned $STATUS"
            exit 1
          fi
          echo "Production smoke test passed"
